services:
  - type: web
    name: dibakar-ai
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: GROQ_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_PASS
        sync: false
      - key: CALLMEBOT_API_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: GOOGLE_CLOUD_PROJECT
        sync: false
